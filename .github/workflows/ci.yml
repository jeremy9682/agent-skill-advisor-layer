name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pyyaml
      - run: python -m py_compile scripts/skill_audit.py
      - run: python -m py_compile scripts/routing_eval.py
      - run: python -m py_compile scripts/governance_health.py
      - run: python -m py_compile scripts/agent_orchestrate.py
      - run: python -m pytest tests
      - name: Hermetic production routing contract
        run: python scripts/routing_eval.py --check --skills-dir tests/fixtures/high-cost-skills
      - name: Expose agent-run CLI for functional QA
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf "${GITHUB_WORKSPACE}/scripts/agent_provider_run.py" "$HOME/.local/bin/agent-run"
          chmod +x "$HOME/.local/bin/agent-run"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: python3 scripts/qa_agent_run_functional.py
