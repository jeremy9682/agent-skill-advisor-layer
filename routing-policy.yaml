# routing-policy.yaml — single machine-readable canon for agent routing policy.
#
# CANON STATUS: This file is the single machine source of truth for task-shape
#   routing, effort tiers, and review-independence invariants. The prose docs
#   (docs/task-routing.md, docs/gate-policy.md, schemas/intent.md) are
#   commentary; where they drift from this file, this file wins.
# ORIGIN: 2026-07-07 dual-model convergence (Codex gpt-5.6 x Claude Fable 5)
#   collapsed ~5 drifting expression surfaces into one canon, plus the
#   2026-07-11 user ruling D3 on ordinary-bug final-review independence.
# RUNTIME: scripts/routing_runtime.py compiles the executable bindings below;
#   provider manifests contain adapters/capabilities only and may not redefine
#   routes.
#
# REVIEW ESCALATION POLICY (added 2026-07-19 after a session where successive
#   multi-model reviews ratcheted a LOCAL dev tool toward a production-security
#   platform — the exact over-engineering anti-pattern those reviews had just
#   diagnosed. Knowing the anti-pattern did not prevent it; a stop rule does.):
#   - DEFAULT single-model. An ordinary change gets AT MOST ONE independent final
#     review (at the task-shape's review_effort_floor below), not a panel.
#   - ESCALATE to multi-model / cross-family review ONLY when one holds: a
#     risk_overlays trigger or restricted_zone / flip-list hit; an unresolved
#     blocker in the first review; an irreversible operation; or the user asks.
#   - ROUND CAP: after a fix, re-review AT MOST ONCE. If it has not converged,
#     escalate to the user — do NOT keep iterating or swapping models on one
#     question. "Run it by another model" is not free; treat rounds as a budget.
#   - CHARTER: a review MUST assume the target repo's declared trust model (e.g.
#     agent-run-orchestrator README "Trust model": operator-permission,
#     Cursor/Claude-Code-level, NOT a production/multi-tenant platform). A finding
#     that only holds by importing a broader threat model than the target declares
#     is OUT OF SCOPE and does not justify escalation or a REJECT.

version: 1

# Effort is TWO independent dimensions. execution_effort may downshift by task
# difficulty (review is the safety net); review_effort_floor may NOT follow it
# down. execution_mode is a work posture (fast/careful), NOT a reasoning effort.
enums:
  execution_seat: [claude, codex, cursor]  # family that PRODUCES the diff
  execution_model:                       # producer model tiers, keyed by family
    claude: [sonnet, opus, fable, claude-fable-5]
    codex: [gpt-5.6-luna, gpt-5.6-terra, gpt-5.6-sol]
    # Shuttle Seal 飞梭：机械/快写默认走 Cursor 命名模型（非 Claude sonnet）
    cursor: [composer-2.5-fast, composer-2.5, cursor-grok-4.5-high, cursor-grok-4.5-high-fast]
  execution_effort: [low, medium, high, max]
  review_effort: [high, xhigh]          # floor is `high`; never below
  execution_mode: [fast, careful]
  review_seat: [codex, fable]           # who may hold the final-review seat
  review_independence: [cross_family_blind, same_family_independent]
  route_concurrency: [family_serial, explicitly_parallel]

# Declarative scheduler admission limits. These do not override a route's own
# serial-group requirement.
concurrency_policy:
  provider_family_limits:
    cursor: 2

# --- Design-domain phase 1 -------------------------------------------------
# Offline governance only. The catalog records authority/provenance and the
# eval file records expected selections; neither is a runtime LLM router.
design_domain:
  status: phase1_offline
  catalog: design-skill-catalog.yaml
  selection_evals: routing-evals/design-cases.yaml
  runtime_consumer: none
  invariants:
    max_visual_authors_per_deliverable: 1
    baseline_precedes_style_overlay: true
    overlay_has_visual_naming_authority: false
    handoff_requires_new_selection_record: true
    usage_claim_requires_read_or_invocation_evidence: true
  deferred:
    - runtime_filter_or_hook
    - embedding_router
    - full_plugin_cache_enforcement
    - automatic_design_md_generation
    - fixed_full_gate_chain

# --- Task-shape base routes -------------------------------------------------
# execution_seat lists the families allowed to PRODUCE the diff for that shape.
# execution_model maps each allowed family to its default model tier. Final
# review is Codex-family (cross-family) unless final_review or an overlay says
# otherwise. execution_effort and review_effort_floor are separate keys so they
# cannot collapse into one number.
task_shapes:
  ordinary_bug_fix:                # pinpoint fix; no judgment shape, no flip trigger
    execution_seat: [claude, codex]  # either family may land (house split: Codex owns pinpoint fixes)
    execution_model:
      claude: sonnet
      codex: gpt-5.6-terra           # ordinary bug tier per the Codex spawn table
    execution_effort: medium
    execution_mode: fast
    review_effort_floor: high
  mechanical:                      # formatting / mechanical edits; no behavior change
    # Shuttle Seal：飞梭默认 Composer 2.5 Fast；并行第二梭用 mechanical_grok 路由
    execution_seat: [cursor]
    execution_model:
      cursor: composer-2.5-fast
    execution_effort: low          # may downshift; base low-medium
    execution_mode: fast
    review_effort_floor: high
  standard_feature:
    execution_seat: [claude]
    execution_model:
      claude: opus
    execution_effort: medium       # base medium-high; may downshift
    execution_mode: careful
    review_effort_floor: high
  judgment:                        # architecture / tradeoffs / schema / 0-to-1; Claude-side direction
    execution_seat: [claude]
    execution_model:
      claude: opus
    execution_effort: high         # do not downshift below high
    execution_mode: careful
    review_effort_floor: high
  restricted_zone:                 # 禁区: money/permissions/migrations/DocType/PII/irreversible
    execution_seat: [claude]
    execution_model:
      claude: opus
    execution_effort: high         # escalate toward max; do NOT downshift
    execution_mode: careful
    review_effort_floor: xhigh     # always inherits the risk overlay below
  arbitration:                     # cross-family tie-break / adversarial judgment seat
    execution_seat: [claude]
    execution_model:
      claude: claude-fable-5
    execution_effort: max
    execution_mode: careful
    review_effort_floor: high

# --- Risk overlays (flip list) ----------------------------------------------
# If a task touches ANY trigger below, apply the overlay ON TOP of its base
# route regardless of shape. Overlays only ratchet UP, never down.
risk_overlays:
  triggers:
    - money
    - permissions
    - migration
    - doctype_or_schema
    - pii
    - irreversible_write
  effect:
    # Ratchet: effective floor = max(base review_effort_floor, overlay floor).
    review_effort_floor: xhigh
    final_review_independence: cross_family_blind   # cross-family mandatory

# --- Final review invariants ------------------------------------------------
final_review:
  # Invariant, applies in ALL cases: the reviewing seat/session is NEVER the one
  # that produced the diff (seat independence). Independence of MODEL FAMILY is
  # the tunable below, and is evaluated as reviewer family vs PRODUCER family
  # (the execution_seat that landed the diff).
  seat_independence: required

  default:
    independence: cross_family_blind    # Codex reviews Claude-family work
    review_effort_floor: high

  # User ruling D3 (2026-07-11): an ordinary bug fix MAY be finally reviewed by
  # an independent same-family session (an independent Codex session/pass that
  # did NOT produce the diff). Seat independence still holds; only the
  # cross-family requirement is relaxed. This is ALLOWED, not required.
  ordinary_bug_fix:
    independence: same_family_independent
    review_effort_floor: high

  # These REMAIN cross-family blind and mandatory; D3 does not relax them.
  # References are canonical ids: task_shapes keys and the risk overlay.
  # Note: mechanical producers are Cursor-family (composer/grok); still require
  # dual-seal when the deliverable is L3/L4 acceptance or gated docs land.
  cross_family_mandatory:
    task_shapes: [judgment, restricted_zone, arbitration]
    risk_overlay_triggers: all   # any flip trigger forces cross_family_blind via the overlay

# --- Executable bindings ----------------------------------------------------
# This is the only runtime launcher table. Provider manifests describe how a
# provider runs and what it can expose; they never own task routes.
#
# Optional per-route keys (agent-run consumes these):
#   timeout_seconds — default wall clock when caller omits --timeout-seconds
#   serial_group    — flock lock name; same group never runs concurrently on one host
#   concurrency     — family_serial requires serial_group; explicitly_parallel
#                      is reserved for the two Cursor mechanical routes
#   managed_skills  — disabled prevents auto-selected skill bodies from
#                      inflating frozen mechanical prompts; explicit plan
#                      context remains available through input_ref/bundles
#
# Review routes MUST run serially within their provider family. Claude-family
# seats (direction + Fable + Opus final review) share serial_group claude-family;
# Codex/Grok review routes use their own family groups. Never run two routes from
# the same provider family in parallel on one machine.
runtime_routes:
  mechanical:
    policy_ref: task_shapes.mechanical
    policy_family: cursor
    provider: cursor
    seat: claude-landing
    concurrency: explicitly_parallel
    managed_skills: disabled
  # 飞梭第二梭：仍属机械落盘，终审走双印；可与 mechanical 并行。
  mechanical_grok:
    provider: cursor
    model: cursor-grok-4.5-high-fast
    effort: high
    seat: claude-landing
    concurrency: explicitly_parallel
    managed_skills: disabled
  ordinary_bug_fix:
    policy_ref: task_shapes.ordinary_bug_fix
    policy_family: codex
    provider: codex
    seat: codex-landing
    concurrency: family_serial
    serial_group: codex-family
  standard_feature:
    policy_ref: task_shapes.standard_feature
    policy_family: claude
    provider: claude
    seat: claude-landing
    concurrency: family_serial
    serial_group: claude-family
  judgment:
    policy_ref: task_shapes.judgment
    policy_family: claude
    provider: claude
    seat: claude-direction
    timeout_seconds: 600
    serial_group: claude-family
    concurrency: family_serial
  external_second_opinion:
    provider: grok
    model: grok-4.5
    effort: high
    seat: claude-direction
    timeout_seconds: 600
    serial_group: grok-family
    concurrency: family_serial
  restricted_zone:
    policy_ref: task_shapes.restricted_zone
    policy_family: claude
    provider: claude
    seat: claude-direction
    timeout_seconds: 600
    serial_group: claude-family
    concurrency: family_serial
  final_review:
    provider: grok
    model: grok-4.5
    effort: high
    governance_effort: xhigh
    seat: codex-final-review
    review_independence: cross-family
    timeout_seconds: 900
    serial_group: grok-family
    concurrency: family_serial
    managed_skills: disabled
  claude_final_review:
    provider: claude
    model: opus
    effort: high
    governance_effort: xhigh
    seat: claude-final-review
    review_independence: cross-family
    timeout_seconds: 900
    serial_group: claude-family
    concurrency: family_serial
    managed_skills: disabled
  fable_final_review:
    provider: claude
    model: claude-fable-5
    effort: max
    seat: fable-final-review
    review_independence: cross-family
    timeout_seconds: 900
    serial_group: claude-family
    concurrency: family_serial
    managed_skills: disabled
  secondary_final_review:
    provider: codex
    model: gpt-5.6-sol
    effort: xhigh
    seat: codex-final-review
    review_independence: independent-supplement
    eligible_producer_routes: [ordinary_bug_fix]
    timeout_seconds: 900
    serial_group: codex-family
    concurrency: family_serial
    managed_skills: disabled
  codex_final_review:
    provider: codex
    model: gpt-5.6-sol
    effort: xhigh
    governance_effort: xhigh
    seat: codex-final-review
    review_independence: cross-family
    timeout_seconds: 900
    serial_group: codex-family
    concurrency: family_serial
    managed_skills: disabled
  arbitration:
    policy_ref: task_shapes.arbitration
    policy_family: claude
    provider: claude
    seat: fable-final-review
    review_independence: cross-family
    timeout_seconds: 900
    serial_group: claude-family
    concurrency: family_serial

# --- Degradation chain ------------------------------------------------------
# When the Codex (cross-family) reviewer is unavailable.
degradation:
  codex_exec_unavailable:
    fallback_reviewer: fable               # review_seat enum; independent Claude-family pass
    require_annotation: "cross-family review absent"
    # Fail-safe: NEVER reuse a stale prior review in place of a fresh pass.
    forbid_stale_review_substitution: true
    # For cross_family_mandatory work the fallback is PROVISIONAL only: it may
    # unblock iteration but NOT completion. Ship requires a fresh cross-family
    # pass once Codex is available, or an explicit user waiver recorded in the
    # intent/ledger.
    cross_family_mandatory_items: provisional_only

# --- Validation (fail-closed) -----------------------------------------------
# For the deferred routing_eval.py wiring: unknown values and empty case sets
# must FAIL, not silently pass as a default route or a vacuous 100% (0/0).
validation:
  fail_closed: true
  unknown_enum_value: fail          # reject any value outside `enums`
  empty_case_set: fail              # 0 cases is a failure, not 0/0 = pass
  missing_required_key: fail
