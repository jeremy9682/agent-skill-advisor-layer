# Phase-1 design-domain catalog. This is inventory and selection-contract data,
# not a runtime router. `routing-policy.yaml` remains the machine canon for
# model routing and review independence.
schema_version: 1
canon_ref: routing-policy.yaml#design_domain
status: phase1_offline
runtime_consumer: none

invariants:
  max_visual_authors_per_deliverable: 1
  baseline_precedes_style_overlay: true
  overlay_has_visual_naming_authority: false
  handoff_requires_new_selection_record: true
  usage_claim_requires_read_or_invocation_evidence: true

baseline_skill_ids: [local/design-systems]
# `baseline` is a selector layer, not a second catalog role. A baseline skill
# keeps the `overlay` role because the same constraints may also be attached as
# an overlay on another surface; this list gives it precedence for selection.

allowed_values:
  role: [direction, author, adapter, overlay, gate]
  call_policy: [auto-eligible, manual-confirm, suggest-confirm, router, explicit-only]
  lifecycle: [candidate, evaluated, approved, deprecated]
  source_kind: [upstream, local-derivative]
  update_policy: [git-managed, merge-only, review-then-ff-only, source-managed]
  surface: [product-ui, mobile-ui, dashboard, detail, table, schedule, marketing-web, deck, image, video]

# Plugin cache is observed for provenance/inventory only in phase 1. Its skills
# are deliberately not promoted to catalog entries or pin enforcement here.
