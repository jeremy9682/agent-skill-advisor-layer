# Routing eval cases — trigger contract for skill routing.
#
# Each case is a realistic user prompt plus routing expectations:
#   expect:        recall@3 passes if ANY listed skill ranks in top-3.
#                  Empty list = no recall assertion (negative case).
#   high_cost_ok:  suggest-confirm skills that are LEGITIMATE candidates
#                  for this prompt. Any other suggest-confirm skill in
#                  top-3 is reported as an unexpected high-cost candidate.
#
# These cases are a regression contract, not a benchmark of intelligence.
# The baseline scorer is lexical; passing here does NOT prove semantic
# routing quality. It proves the contract did not silently regress.
#
# Overfit warning (from Codex review): cases are tuned to this machine's
# skill fleet. When a case references a skill that is not installed, the
# runner reports it as `skipped_missing_skill` instead of failing.

version: 1
cases:
  # --- recall cases: the skill SHOULD surface ---
  - id: xhs-cover-image
    prompt: "帮我做一张好看的小红书封面图"
    expect: [huashu-xhs-image, huashu-design, guizang-ppt-skill]

  - id: magazine-ppt
    prompt: "做一个电子杂志风格的横向翻页 PPT 汇报"
    expect: [guizang-ppt-skill, html-ppt, huashu-slides]

  - id: regression-500
    prompt: "这个接口报 500 了，昨天还好好的，帮我查一下为什么"
    expect: [investigate, gstack-openclaw-investigate]

  - id: diff-review
    prompt: "review 一下我当前分支的改动"
    expect: [review, devex-review]

  - id: grill-me-plan
    prompt: "grill me 这个产品判断，别顺着我，帮我找漏洞"
    expect: [grilling]

  - id: matt-hard-bug-loop
    prompt: "这个性能回归很难复现，先建立 red-capable feedback loop，缩到最小复现再修"
    expect: [diagnosing-bugs, investigate]

  - id: matt-grill-with-docs
    prompt: "在代码库里 grill 我，边拷问边把统一术语写进 CONTEXT.md，把关键取舍记录成 ADR"
    expect: [grill-with-docs, domain-modeling]

  - id: matt-issue-triage
    prompt: "用 /triage 分诊这些 GitHub issues 和外部 PR，整理到 ready-for-agent"
    expect: [triage]

  - id: matt-tdd
    prompt: "这段行为按测试驱动开发做，先写失败测试，再走 red green refactor"
    expect: [tdd]

  - id: matt-to-spec
    prompt: "用 /to-spec 把我们当前对话整理并发布成实施规格"
    expect: [to-spec]

  - id: matt-to-tickets
    prompt: "用 /to-tickets 把这个 spec 拆成带阻塞关系的 tracer bullet tickets"
    expect: [to-tickets]

  - id: matt-implement
    prompt: "明确运行 /implement，按已有 spec 和 tickets 逐个实现"
    expect: [implement]

  - id: matt-throwaway-prototype
    prompt: "做一个抛弃式可运行原型，用来回答状态模型是否合理，不是生产实现"
    expect: [prototype]

  - id: matt-domain-modeling
    prompt: "做领域模型压力测试，统一领域术语并维护 CONTEXT.md glossary"
    expect: [domain-modeling]

  - id: matt-codebase-design
    prompt: "用 deep module 和 seam 的方法重新思考这个模块接口深度"
    expect: [codebase-design]

  - id: matt-handoff
    prompt: "用 /handoff 生成跨会话交接文档，让新会话接手"
    expect: [handoff, context-save]

  - id: matt-teach
    prompt: "用 /teach 建立一个多会话教学 workspace，持续记录 lessons 和学习进度"
    expect: [teach]

  - id: matt-writing-great-skills
    prompt: "用 /writing-great-skills 教我怎么写好 SKILL.md 的信息层级和 leading words"
    expect: [writing-great-skills, skill-creator]

  - id: site-qa
    prompt: "帮我测试一下这个网站，找找有没有 bug"
    expect: [qa, qa-only, browse]

  - id: new-design-system
    prompt: "新项目要开工了，先定一套设计系统，建个 DESIGN.md"
    expect: [design-consultation, design-systems]
    # Known leak, measured 2026-07-06: huashu-agent-swarm's keyword-dense
    # description attracts this innocent prompt to rank 3. Tolerated (the
    # governance gate holds it at suggest-confirm); remove this entry once
    # the description is fixed upstream — the leak then fails the check.
    known_leaks: [huashu-agent-swarm]

  - id: html-to-mp4
    prompt: "把这个 HTML 动画导出成 60fps 的 MP4"
    expect: [huashu-design]

  - id: social-scan
    prompt: "今天 X 和 Reddit 上有什么 AI agent 的新讨论"
    expect: [social-monitor]

  - id: social-scan-readonly
    prompt: "请只读分析今天 X 和 Reddit 上 AI agent 的新讨论"
    expect: [social-monitor]
    # Guards against re-introducing the over-broad "只读分析" negative_trigger.
    # This is a GENUINE user request (read-only social scan) and must still
    # surface social-monitor; agent-brief leaks are handled by the global
    # should_skip_prompt guard, not per-skill suppression.

  - id: security-audit
    prompt: "扫一下这个 repo 有没有安全漏洞"
    expect: [cso, security-best-practices, security-threat-model]

  - id: onboarding-prototype
    prompt: "make an interactive hi-fi prototype of the onboarding flow"
    expect: [huashu-design, superdesign, frontend-design]

  - id: claude-code-design-context
    prompt: "在 Claude Code 里帮我设计一个落地页视觉原型"
    expect: [huashu-design]

  - id: script-polish
    prompt: "把这段口播讲稿润色一下，节奏自然一点"
    expect: [huashu-script-polish, huashu-speech-coach]

  - id: capcut-subtitles
    prompt: "剪映里帮我给这个视频加字幕"
    expect: [cut-draft]

  - id: product-image
    prompt: "帮我生成一张产品宣传图"
    expect: [imagegen, higgsfield-generate, higgsfield-product-photoshoot, awesome-gpt-image]

  # --- gate cases: high-cost skill is a legitimate candidate,
  #     but must remain suggest-confirm (router may surface, gate must hold) ---
  - id: ship-to-prod
    prompt: "没问题了的话帮我把这个项目 ship 上线"
    expect: [ship, land-and-deploy, setup-deploy]
    high_cost_ok: [ship, land-and-deploy]

  - id: overnight-run
    prompt: "我要睡觉了，剩下的任务你通宵跑完，明早给我结果"
    expect: [overnight-execution]
    high_cost_ok: [overnight-execution]

  - id: parallel-swarm
    prompt: "这个大项目前后端测试文档一起并行推进吧"
    expect: [huashu-agent-swarm]
    high_cost_ok: [huashu-agent-swarm]

  - id: sprint-retro
    prompt: "这个 sprint 结束了，复盘一下"
    expect: [retro, gstack-openclaw-retro]
    high_cost_ok: [retro, gstack-openclaw-retro]

  - id: shared-browser-debug
    prompt: "把浏览器上下文共享给另一个 agent 一起排查这个页面问题"
    expect: [pair-agent]
    high_cost_ok: [pair-agent]

  - id: matt-background-research
    prompt: "运行 /research，派后台 agent 查一手资料并生成有引用的 Markdown 调研文件"
    expect: [research]
    high_cost_ok: [research]

  - id: matt-two-axis-code-review
    prompt: "运行 /code-review，从固定提交开始做 Standards + Spec 双轴并行审查"
    expect: [code-review]
    high_cost_ok: [code-review]

  - id: matt-architecture-health-scan
    prompt: "运行 /improve-codebase-architecture，用 Explore agent 做一次全库架构健康扫描"
    expect: [improve-codebase-architecture]
    high_cost_ok: [improve-codebase-architecture]

  - id: matt-wayfinder
    prompt: "运行 /wayfinder，为这个巨大模糊的跨会话项目建立 fog-of-war issue map"
    expect: [wayfinder]
    high_cost_ok: [wayfinder]

  # --- negative cases: no skill should be needed;
  #     assert only that no high-cost skill surfaces ---
  - id: plain-question
    prompt: "python 的 GIL 到底是什么？"
    expect: []

  - id: goodbye
    prompt: "谢谢，今天先到这里"
    expect: []

  - id: fable-independent-review
    prompt: "你是 Claude Fable 5，作为独立外部审核者。请只基于下面事实包分析，不需要读文件，不要调用工具。"
    expect: []

  - id: claude-code-second-opinion
    prompt: "你是 Claude Code，作为 Codex 之外的独立第二意见。只做只读分析，不要改文件。"
    expect: []

  - id: task-notification-meta
    prompt: "<task-notification><task-id>w8s8esecj</task-id><tool-use-id>toolu_01QgJk3HawMK</tool-use-id></task-notification>"
    expect: []

  # Agent-brief leaks locked in: seat labels put words between "你是" and the
  # model name, defeating the "你是 Claude" substring. These must be skipped as
  # agent_to_agent_prompt (role markers added to AGENT_TO_AGENT_PATTERNS), so
  # no skill — high-cost or otherwise — may fire.
  - id: dispatch-judge-brief-leak
    prompt: "你是本项目的 Claude 动态工作流调度/判断席。请只读文件，不要修改文件。评估当前分支的改动方向是否合理。"
    expect: []

  - id: fable-final-reviewer-brief-leak
    prompt: "你是 Fable5 反方终审席。请只读，不要修改文件。对下面的方案做对抗性复核。"
    expect: []
    # NOTE: the anti-over-suppression invariant for seat words (genuine
    # "判断席/终审席" prompts must NOT be globally skipped) is asserted directly
    # against should_skip_prompt in tests/test_routing_eval.py — it lives at the
    # skip layer, which cases.yaml (fire layer) cannot distinguish from no-fire.

  # CJK-fragment false positives locked in (2026-07-11, real-world CJK session):
  # plain Chinese execution directives scored huashu-design at 13.43 (3.4x
  # the old threshold) — single-char CJK tokens + generic process-word
  # bigrams from its long Chinese description carry inflated IDF in a
  # mostly-English fleet. Fixed in tokenize (no single CJK chars, no 1-2
  # digit numbers) + CJK_STOP_BIGRAMS extension + threshold recalibration.
  - id: exec-directive-with-review-seats
    prompt: "好的，按照你们的建议执行，，根据任务的难度分配不同的模型和effort，给Claude还有codex，codex 5.6 和fable5用来最终审核"
    expect: []

  - id: explain-in-simple-terms
    prompt: "这是那个是什么用简单易懂的语言讲解下"
    expect: []

  - id: ordinary-question-not-teach-workspace
    prompt: "简单解释一下 Python 装饰器是什么，不要建立课程或写文件"
    expect: []

  - id: ordinary-review-not-matt-parallel
    prompt: "普通 review 一下当前分支的改动，不要派 agent"
    expect: [review]

  - id: prod-handoff-instruction
    prompt: "你把具体指令或者谁handoff告诉我，我让生产环节的Claude去做"
    expect: []

# --- model routing policy cases ---
# These are offline policy checks for task scale, not prompt routing cases.
# They never call models and never affect the UserPromptSubmit hook.
model_routing_cases:
  - id: small-fix-low-risk
    task_shape: small_fix
    risk_zone: low
    repo_profile: default
    expect_policy:
      direction_seat: codex
      landing_seat: codex
      final_review_seat: none
      effort: medium-fast
      gates: [focused_verification]
      hot_path: false

  - id: default-feature
    task_shape: feature
    risk_zone: default
    repo_profile: default
    expect_policy:
      direction_seat: claude
      landing_seat: implementation_owner
      final_review_seat: codex
      effort: high
      gates: [intent, final_diff_review]
      hot_path: false

  - id: broad-refactor-plan-gate
    task_shape: broad_refactor
    risk_zone: default
    repo_profile: default
    expect_policy:
      direction_seat: claude
      landing_seat: implementation_owner
      final_review_seat: codex
      effort: high
      gates: [intent, plan_gate, final_diff_review]
      hot_path: false

  - id: restricted-feature
    task_shape: feature
    risk_zone: restricted
    repo_profile: restricted-zone-heavy
    expect_policy:
      direction_seat: claude
      landing_seat: implementation_owner
      final_review_seat: codex
      effort: xhigh
      gates: [intent, plan_gate, blind_plan_review, final_diff_review]
      hot_path: false

  - id: code-review-default
    task_shape: code_review
    risk_zone: default
    repo_profile: default
    expect_policy:
      direction_seat: reviewer
      landing_seat: none
      final_review_seat: none
      effort: high
      gates: [intent]
      hot_path: false

  - id: release-ship
    task_shape: release_ship
    risk_zone: irreversible
    repo_profile: default
    expect_policy:
      direction_seat: gate_owner
      landing_seat: release_owner
      final_review_seat: codex
      effort: xhigh
      gates: [intent, green_checks, final_diff_review, ship_gate]
      hot_path: false

  - id: restricted-repo-mechanical-small-fix
    task_shape: small_fix
    risk_zone: low
    repo_profile: restricted-zone-heavy
    mechanical: true
    expect_policy:
      direction_seat: codex
      landing_seat: codex
      final_review_seat: none
      effort: medium-fast
      gates: [focused_verification]
      hot_path: false

# --- candidate zone ---
# Reserved for the skill-doctor loop: real routing failures observed in
# sessions (should-have-triggered, wrongly-suggested, user-rejected
# suggestions) get appended here as candidates, then promoted into
# `cases:` after human review. Do not promote automatically.
candidates:
  - id: cand-workflow-basename-false-trigger
    observed: "2026-07-06"
    source: "vercel-plugin PreToolUse hook, this repo"
    prompt: "edit docs/development-workflow-standard.md (agent governance doc)"
    failure: >-
      Basename pattern `*workflow*` fired the Vercel durable-workflow skill
      suggestion for a markdown governance doc. Lexical trigger, wrong
      domain. Lesson: filename/keyword triggers need a domain check before
      suggesting; candidate rule for description lint or router hook.

  - id: cand-cicd-suffix-false-trigger
    observed: "2026-07-06"
    source: "vercel-plugin PreToolUse hook, this repo"
    prompt: "read .github/workflows/ci.yml (plain pytest CI, no Vercel surface)"
    failure: >-
      Suffix pattern `.github/workflows/*.yml` fired the Vercel
      deployments-cicd skill for a repo with no Vercel usage. Second false
      positive from the same hook family within one session: path-pattern
      triggers without a repo-level domain check are a systematic false
      positive source, not an anecdote.
