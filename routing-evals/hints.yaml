    negative_triggers: ["review", "当前分支", "代码审查", "审 diff", "测试网站", "安全", "安全审计", "安全漏洞", "权限问题", "repo", "ship 上线", "发布到 production"]
    rationale: "upstream mattpocock/skills uses grill-me as an explicit wrapper and grilling as model-invoked logic; surface grilling for natural-language pressure-test requests without replacing review/qa/security/ship gates"
    source: "mattpocock grill-me/grilling install 2026-07-09"
