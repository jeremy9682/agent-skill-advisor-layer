  - skill: grilling
    extra_triggers: ["grill me", "push back", "challenge my thinking", "red-team this", "拷问我", "质询我", "挑战我", "反方审一下", "别顺着我", "找漏洞", "压测观点", "压测计划"]
    negative_triggers: ["review", "当前分支", "代码审查", "审 diff", "测试网站", "安全", "安全审计", "安全漏洞", "权限问题", "repo", "ship 上线", "发布到 production"]
    rationale: "grilling is top-level explicit-only (hot-route-excluded from lexical auto-suggest); extra_triggers keep it lexically recallable for index-layer eval, but production does not auto-surface it — the user reaches it by explicitly naming /grill-me, /grilling, or the grilling workflow, and pinned Matt workflows may call it internally"
    source: "grilling explicit-only policy 2026-07-13 (see DEFAULT_HOT_ROUTE_EXCLUDE)"

