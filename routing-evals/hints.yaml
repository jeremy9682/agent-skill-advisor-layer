# Routing hints overlay — policy-layer routing metadata.
#
# Purpose: fix trigger reachability WITHOUT editing third-party SKILL.md
# (upstream drift). The router hook and routing_eval merge these into the
# lexical index, so eval measures exactly what production scores.
#
# Fields per entry (M2, blind-review mandated):
#   skill:             target skill name (must exist locally; unknown = ignored)
#   extra_triggers:    additional trigger tokens/phrases (mostly Chinese — the
#                      user prompts in Chinese; 80/109 descriptions have no CJK)
#   negative_triggers: prompt patterns that must EXCLUDE this skill from
#                      candidates (black-hole damping)
#   domains:           optional cwd substrings; outside them the skill is
#                      excluded (project-scoped skills)
#   rationale:         why this hint exists (one line)
#   source:            where the need was measured
#
# Rule: hints are curated by humans after eval/doctor evidence. Do not bulk-
# generate; each entry needs a rationale.

version: 1
hints:
  # --- black-hole damping (measured 2026-07-06: attractor in 8/18 miss cases) ---
  - skill: xyq-nest-skill
    extra_triggers: []
    negative_triggers: ["修 bug", "review", "审查", "测试网站", "安全", "复盘", "ship", "上线", "原型", "封面", "字幕"]
    domains: ["xyq", "nest"]
    rationale: "242-CJK-char description attracts every Chinese prompt; scope to its own project"
    source: "routing_eval baseline 2026-07-06, 8/18 miss cases"

  # --- English-only descriptions, Chinese triggers unreachable (80/109 problem) ---
  - skill: investigate
